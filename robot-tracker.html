<!DOCTYPE html>
<html lang="ru" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>⭐ Трекер</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap');
:root {
  --eytan:#4A90D9; --eytan-light:#D6EAFF; --eytan-dark:#2A6BAF;
  --michal:#A855F7; --michal-light:#EDD9FF; --michal-dark:#7B2FBE;
  --bg:#F4F1FF; --text:#1A1530; --muted:#8B80A8; --card:#FFF; --gold:#F59E0B;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);overflow-x:hidden}
body.rtl{direction:rtl}
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}
.stars{position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(1px 1px at 8% 12%,rgba(255,255,255,.9),transparent),radial-gradient(1.5px 1.5px at 25% 6%,#fff,transparent),radial-gradient(1px 1px at 50% 18%,rgba(255,255,255,.7),transparent),radial-gradient(1px 1px at 72% 9%,#fff,transparent),radial-gradient(1.5px 1.5px at 88% 22%,rgba(255,255,255,.8),transparent),radial-gradient(1px 1px at 15% 38%,rgba(255,255,255,.5),transparent),radial-gradient(1px 1px at 38% 32%,#fff,transparent),radial-gradient(1px 1px at 62% 28%,rgba(255,255,255,.6),transparent),radial-gradient(1px 1px at 80% 42%,rgba(255,255,255,.4),transparent),radial-gradient(1.5px 1.5px at 92% 55%,#fff,transparent),radial-gradient(1px 1px at 5% 68%,rgba(255,255,255,.6),transparent),radial-gradient(1px 1px at 45% 72%,#fff,transparent),radial-gradient(1px 1px at 68% 65%,rgba(255,255,255,.5),transparent),radial-gradient(1px 1px at 85% 78%,rgba(255,255,255,.7),transparent)}

/* LOCK */
#lock{background:linear-gradient(160deg,#0F0820,#1E1040 60%,#0F0820);align-items:center;justify-content:center;flex-direction:column;padding:40px 30px;position:relative;overflow:hidden}
#lock::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 25%,rgba(74,144,217,.15),transparent 50%),radial-gradient(ellipse at 80% 75%,rgba(168,85,247,.18),transparent 50%);pointer-events:none}
.lock-emoji{font-size:68px;margin-bottom:14px;position:relative;animation:pulse 2.5s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.lock-title{font-family:'Fredoka One',cursive;font-size:34px;color:#fff;text-align:center;margin-bottom:6px;position:relative}
.lock-sub{color:rgba(255,255,255,.5);font-size:14px;text-align:center;margin-bottom:44px;position:relative}
.pin-dots{display:flex;gap:18px;margin-bottom:38px;position:relative}
.dot{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,.35);background:transparent;transition:all .2s cubic-bezier(.34,1.56,.64,1)}
.dot.filled{background:#fff;border-color:#fff;transform:scale(1.2);box-shadow:0 0 12px rgba(255,255,255,.5)}
.dot.err{background:#FF4466;border-color:#FF4466;animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.numpad{display:grid;grid-template-columns:repeat(3,76px);gap:14px;position:relative}
.nk{width:76px;height:76px;border-radius:50%;border:2px solid rgba(255,255,255,.12);background:rgba(255,255,255,.07);color:#fff;font-family:'Fredoka One',cursive;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.nk:active{background:rgba(255,255,255,.22);transform:scale(.9)}
.nk.del{font-size:22px;border-color:transparent;background:transparent}
.nk.blank{border-color:transparent;background:transparent;cursor:default}
.pin-err{color:#FF7090;font-size:13px;font-weight:700;margin-top:20px;opacity:0;transition:opacity .3s;position:relative}
.pin-err.show{opacity:1}
.lang-toggle-lock{position:absolute;top:20px;right:20px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:6px 14px;color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;cursor:pointer}
.view-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:16px;padding:10px 24px;color:rgba(255,255,255,.7);font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;cursor:pointer;margin-top:28px;position:relative}

/* HOME */
#home{align-items:center;justify-content:center;padding:30px 24px;position:relative;overflow:hidden;background:linear-gradient(160deg,#0F0820,#1E1040 55%,#0F0820)}
#home::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 15% 20%,rgba(74,144,217,.12),transparent 45%),radial-gradient(ellipse at 85% 80%,rgba(168,85,247,.15),transparent 45%);pointer-events:none}
.home-wrap{position:relative;width:100%;max-width:680px;display:flex;flex-direction:column;align-items:center;gap:0}
.home-top{position:relative;width:100%;text-align:center;margin-bottom:30px}
.home-title{font-family:'Fredoka One',cursive;font-size:38px;color:#fff;text-shadow:0 0 30px rgba(168,85,247,.4)}
.home-sub{color:rgba(255,255,255,.5);font-size:14px;margin-top:4px}
.lang-toggle{position:absolute;top:0;right:0;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:7px 16px;color:rgba(255,255,255,.8);font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;cursor:pointer}
.admin-btn{position:absolute;top:0;left:0;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:50%;width:42px;height:42px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff}
.child-cards{display:flex;gap:18px;width:100%;position:relative}
.child-card{flex:1;border-radius:26px;padding:26px 18px 22px;cursor:pointer;border:none;text-align:center;transition:transform .18s,box-shadow .18s;position:relative;overflow:hidden}
.child-card:active{transform:scale(.96)}
.child-card.eytan{background:linear-gradient(145deg,#5BA3E8,#3A7BC8);box-shadow:0 18px 50px rgba(74,144,217,.45)}
.child-card.michal{background:linear-gradient(145deg,#C084FC,#9333EA);box-shadow:0 18px 50px rgba(168,85,247,.45)}
.child-avatar{font-size:64px;display:block;margin-bottom:8px;filter:drop-shadow(0 3px 8px rgba(0,0,0,.25))}
.child-name{font-family:'Fredoka One',cursive;font-size:28px;color:#fff;margin-bottom:2px}
.child-robot{font-size:12px;color:rgba(255,255,255,.7);font-weight:700;margin-bottom:10px}
.child-pts-big{font-family:'Fredoka One',cursive;font-size:32px;color:#fff;line-height:1}
.child-pts-lbl{font-size:12px;color:rgba(255,255,255,.75);font-weight:700;margin-bottom:12px}
.mini-bar{background:rgba(255,255,255,.22);border-radius:20px;height:10px;overflow:hidden;margin-top:10px}
.mini-bar-fill{height:100%;border-radius:20px;background:rgba(255,255,255,.9);transition:width .7s ease}
.sync-badge{margin-top:22px;color:rgba(255,255,255,.35);font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#4ADE80;box-shadow:0 0 6px #4ADE80}
.sync-dot.off{background:#F87171;box-shadow:0 0 6px #F87171}
.offline-banner{background:#FEF3C7;border-bottom:2px solid #F59E0B;padding:8px 16px;font-size:12px;font-weight:700;color:#92400E;text-align:center;display:none}
.offline-banner.show{display:block}

/* CHILD SCREEN */
#child-screen{flex-direction:column}
.child-header{padding:22px 20px 28px;position:relative;overflow:hidden}
.child-header.eytan{background:linear-gradient(155deg,#5BA3E8,#2A6BAF)}
.child-header.michal{background:linear-gradient(155deg,#C084FC,#7B2FBE)}
.back-btn{background:rgba(255,255,255,.18);border:none;border-radius:14px;padding:8px 16px;color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;cursor:pointer;margin-bottom:18px;display:inline-flex;align-items:center;gap:6px}
.header-row{display:flex;align-items:center;gap:18px}
.header-emoji{font-size:60px;filter:drop-shadow(0 3px 10px rgba(0,0,0,.3))}
.header-info{flex:1}
.header-name{font-family:'Fredoka One',cursive;font-size:34px;color:#fff;line-height:1;margin-bottom:2px}
.header-prize{color:rgba(255,255,255,.75);font-size:12px;font-weight:700;margin-bottom:10px}
.prog-wrap{background:rgba(255,255,255,.22);border-radius:20px;height:18px;overflow:hidden}
.prog-fill{height:100%;border-radius:20px;background:#fff;transition:width .9s cubic-bezier(.34,1.56,.64,1);position:relative}
.prog-fill::after{content:'';position:absolute;right:0;top:0;bottom:0;width:28px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.45))}
.prog-labels{display:flex;justify-content:space-between;margin-top:5px;color:rgba(255,255,255,.85);font-size:12px;font-weight:700}
.content{flex:1;padding:18px;overflow-y:auto}
.tabs{display:flex;gap:6px;margin-bottom:18px;background:#fff;border-radius:16px;padding:5px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.tab-btn{flex:1;padding:10px 4px;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;cursor:pointer;background:transparent;color:var(--muted);transition:all .2s}
.tab-btn.active.eytan-tab{background:var(--eytan);color:#fff}
.tab-btn.active.michal-tab{background:var(--michal);color:#fff}
.sec-title{font-family:'Fredoka One',cursive;font-size:17px;color:var(--text);margin:16px 0 10px;display:flex;align-items:center;gap:7px}
.task-card{background:#fff;border-radius:16px;padding:13px 14px;margin-bottom:9px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.task-icon{font-size:28px;width:38px;text-align:center;flex-shrink:0}
.task-info{flex:1}
.task-name{font-weight:800;font-size:14px}
.task-desc{font-size:11px;color:var(--muted);margin-top:1px}
.task-pts{font-family:'Fredoka One',cursive;font-size:20px;flex-shrink:0}
.task-pts.eytan-c{color:var(--eytan)}
.task-pts.michal-c{color:var(--michal)}
.add-task-btn{width:38px;height:38px;border-radius:50%;border:none;font-size:22px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s}
.add-task-btn:active{transform:scale(.82)}
.add-task-btn.eytan-btn{background:var(--eytan-light);color:var(--eytan-dark)}
.add-task-btn.michal-btn{background:var(--michal-light);color:var(--michal-dark)}
.bonus-box{background:#fff;border-radius:18px;padding:18px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:18px}
.bonus-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.bonus-input{flex:1;min-width:120px;padding:11px 14px;border-radius:12px;border:2px solid #E8E2F5;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;outline:none;transition:border-color .2s}
.bonus-num{width:80px;padding:11px 10px;border-radius:12px;border:2px solid #E8E2F5;font-family:'Fredoka One',cursive;font-size:20px;text-align:center;outline:none}
.bonus-go{padding:11px 18px;border-radius:12px;border:none;font-family:'Fredoka One',cursive;font-size:17px;color:#fff;cursor:pointer;transition:transform .15s;white-space:nowrap}
.bonus-go:active{transform:scale(.94)}
.bonus-go.eytan-btn{background:var(--eytan)}
.bonus-go.michal-btn{background:var(--michal)}
.ideas-box{background:#FFF8E6;border-radius:16px;padding:14px 16px;border:2px dashed #F59E0B}
.ideas-list{font-size:13px;color:#7A5F10;line-height:2;margin-top:8px;white-space:pre-line}
.hist-item{background:#fff;border-radius:14px;padding:11px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.hist-icon{font-size:22px}
.hist-info{flex:1}
.hist-name{font-weight:800;font-size:13px}
.hist-date{font-size:11px;color:var(--muted)}
.hist-pts{font-family:'Fredoka One',cursive;font-size:17px}
.hist-pts.eytan-c{color:var(--eytan)}
.hist-pts.michal-c{color:var(--michal)}
.undo-btn{background:none;border:none;font-size:16px;cursor:pointer;opacity:.4;padding:4px}
.empty{text-align:center;padding:30px 10px;color:var(--muted);font-size:14px}
.empty-ico{font-size:38px;margin-bottom:8px}

/* WIN */
#win{background:linear-gradient(160deg,#0F0820,#1E1040);align-items:center;justify-content:center;text-align:center;padding:40px 24px;position:relative;overflow:hidden}
.cp{position:absolute;border-radius:3px;animation:fall linear infinite}
@keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
.win-emoji{font-size:96px;margin-bottom:18px;animation:bounce .7s ease-in-out infinite alternate;position:relative}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-14px)}}
.win-title{font-family:'Fredoka One',cursive;font-size:36px;color:#fff;margin-bottom:8px;text-shadow:0 0 30px rgba(245,158,11,.6);position:relative}
.win-sub{color:rgba(255,255,255,.65);font-size:16px;margin-bottom:36px;position:relative}
.win-back{background:#fff;border:none;border-radius:22px;padding:15px 44px;font-family:'Fredoka One',cursive;font-size:20px;cursor:pointer}

/* ADMIN MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(5px)}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:24px;padding:26px;width:100%;max-width:380px}
.modal-title{font-family:'Fredoka One',cursive;font-size:22px;margin-bottom:18px}
.modal-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #F0EAF8}
.modal-lbl{font-weight:800;font-size:14px}
.modal-val{font-family:'Fredoka One',cursive;font-size:22px;color:var(--muted)}
.reset-btn{width:100%;padding:13px;border-radius:14px;border:2px solid #FFE0E5;background:#FFF5F7;color:#E53935;font-family:'Nunito',sans-serif;font-weight:900;font-size:14px;cursor:pointer;margin-top:10px}
.modal-close{width:100%;padding:13px;border-radius:14px;border:none;background:#F0EAFF;color:var(--michal);font-family:'Nunito',sans-serif;font-weight:900;font-size:14px;cursor:pointer;margin-top:8px}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(90px);background:#1A1530;color:#fff;padding:11px 22px;border-radius:30px;font-weight:800;font-size:14px;transition:transform .35s cubic-bezier(.34,1.56,.64,1);z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.loading-overlay{position:fixed;inset:0;background:rgba(15,8,32,.7);z-index:500;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.loading-overlay.hidden{display:none}
.spinner{width:44px;height:44px;border:4px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- LOCK -->
<div id="lock" class="screen active">
  <div class="stars"></div>
  <button class="lang-toggle-lock" onclick="toggleLang()">🌐 <span id="lang-lbl-lock">עב</span></button>
  <div class="lock-emoji">🔐</div>
  <div class="lock-title" id="lt"></div>
  <div class="lock-sub" id="ls"></div>
  <div class="pin-dots">
    <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
  </div>
  <div class="numpad">
    <button class="nk" onclick="np('1')">1</button><button class="nk" onclick="np('2')">2</button><button class="nk" onclick="np('3')">3</button>
    <button class="nk" onclick="np('4')">4</button><button class="nk" onclick="np('5')">5</button><button class="nk" onclick="np('6')">6</button>
    <button class="nk" onclick="np('7')">7</button><button class="nk" onclick="np('8')">8</button><button class="nk" onclick="np('9')">9</button>
    <div class="nk blank"></div><button class="nk" onclick="np('0')">0</button><button class="nk del" onclick="nd()">⌫</button>
  </div>
  <div class="pin-err" id="pin-err"></div>
  <button class="view-btn" onclick="viewOnly()" id="view-btn"></button>
</div>

<!-- HOME -->
<div id="home" class="screen">
  <div class="offline-banner" id="offline-banner"></div>
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 24px;position:relative;background:linear-gradient(160deg,#0F0820,#1E1040 55%,#0F0820);overflow:hidden;">
    <div class="stars"></div>
    <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 15% 20%,rgba(74,144,217,.12),transparent 45%),radial-gradient(ellipse at 85% 80%,rgba(168,85,247,.15),transparent 45%);pointer-events:none;"></div>
    <div class="home-wrap">
      <div class="home-top">
        <button class="admin-btn" onclick="openAdmin()" id="admin-btn" style="display:none">⚙️</button>
        <div class="home-title" id="home-title"></div>
        <div class="home-sub" id="home-sub"></div>
        <button class="lang-toggle" onclick="toggleLang()">🌐 <span id="lang-lbl-home">עב</span></button>
      </div>
      <div class="child-cards">
        <div class="child-card eytan" onclick="openChild('eytan')">
          <span class="child-avatar">🧒</span>
          <div class="child-name" id="eytan-card-name"></div>
          <div class="child-robot" id="eytan-card-prize"></div>
          <div class="child-pts-big" id="eytan-pts">0</div>
          <div class="child-pts-lbl" id="eytan-pts-lbl"></div>
          <div class="mini-bar"><div class="mini-bar-fill" id="eytan-mini" style="width:0%"></div></div>
        </div>
        <div class="child-card michal" onclick="openChild('michal')">
          <span class="child-avatar">👧</span>
          <div class="child-name" id="michal-card-name"></div>
          <div class="child-robot" id="michal-card-prize"></div>
          <div class="child-pts-big" id="michal-pts">0</div>
          <div class="child-pts-lbl" id="michal-pts-lbl"></div>
          <div class="mini-bar"><div class="mini-bar-fill" id="michal-mini" style="width:0%"></div></div>
        </div>
      </div>
      <div class="sync-badge">
        <div class="sync-dot" id="sync-dot"></div>
        <span id="sync-txt"></span>
      </div>
    </div>
  </div>
</div>

<!-- CHILD SCREEN -->
<div id="child-screen" class="screen">
  <div class="offline-banner" id="offline-banner2"></div>
  <div class="child-header" id="child-header">
    <button class="back-btn" onclick="goHome()" id="back-btn"></button>
    <div class="header-row">
      <div class="header-emoji" id="h-emoji">🧒</div>
      <div class="header-info">
        <div class="header-name" id="h-name"></div>
        <div class="header-prize" id="h-prize"></div>
        <div class="prog-wrap"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
        <div class="prog-labels"><span id="prog-cur"></span><span>🏆 500</span></div>
      </div>
    </div>
  </div>
  <div class="content">
    <div class="tabs">
      <button class="tab-btn active" id="tab-tasks-btn" onclick="switchTab('tasks')"></button>
      <button class="tab-btn" id="tab-bonus-btn" onclick="switchTab('bonus')"></button>
      <button class="tab-btn" id="tab-hist-btn" onclick="switchTab('hist')"></button>
    </div>
    <div id="tab-tasks">
      <div class="sec-title" id="sec-home"></div><div id="tasks-home"></div>
      <div class="sec-title" id="sec-study"></div><div id="tasks-study"></div>
      <div class="sec-title" id="sec-behavior"></div><div id="tasks-behavior"></div>
    </div>
    <div id="tab-bonus" style="display:none">
      <div class="bonus-box">
        <div class="sec-title" id="bonus-title"></div>
        <p style="font-size:12px;color:var(--muted)" id="bonus-desc"></p>
        <div class="bonus-row">
          <input type="text" class="bonus-input" id="bonus-name" maxlength="40">
          <input type="number" class="bonus-num" id="bonus-pts" min="1" max="200" placeholder="⭐">
          <button class="bonus-go" id="bonus-go-btn" onclick="addBonus()"></button>
        </div>
      </div>
      <div class="ideas-box">
        <div class="sec-title" id="ideas-title"></div>
        <div class="ideas-list" id="ideas-list"></div>
      </div>
    </div>
    <div id="tab-hist" style="display:none"><div id="hist-list"></div></div>
  </div>
</div>

<!-- WIN -->
<div id="win" class="screen">
  <div style="position:absolute;inset:0;overflow:hidden;pointer-events:none" id="confetti"></div>
  <div class="win-emoji" id="win-emoji">🤖</div>
  <div class="win-title" id="win-title"></div>
  <div class="win-sub" id="win-sub"></div>
  <button class="win-back" onclick="goHome()" id="win-back-btn"></button>
</div>

<!-- ADMIN -->
<div class="overlay" id="admin-modal">
  <div class="modal">
    <div class="modal-title" id="admin-title"></div>

function t(key) { return T[key][lang] || T[key].ru; }

const CHILDREN = {

  michal: { nameRu:'Михаль', nameHe:'מיכל',  emoji:'👧', prizeEmoji:'🐕', prizeRu:'Собака', prizeHe:'כלב',  color:'michal', tabCls:'michal-tab' },
};
function cname(k) { return lang==='he'? CHILDREN[k].nameHe : CHILDREN[k].nameRu; }
function cpname(k){ return lang==='he'? CHILDREN[k].prizeHe: CHILDREN[k].prizeRu; }

const TASKS = {
  home: [
    {id:'dishes', icon:'🍽️', ru:'Убрать со стола',   he:'לסדר את השולחן', descRu:'После еды',              descHe:'אחרי אוכל',           pts:5  },
    {id:'room',   icon:'🛏️', ru:'Убрать в комнате',  he:'לסדר את החדר',   descRu:'Всё по местам',          descHe:'הכל למקומות',          pts:15 },
    {id:'trash',  icon:'🗑️', ru:'Вынести мусор',     he:'לזרוק אשפה',     descRu:'Отнести пакет',          descHe:'להוציא שקית',          pts:10 },
    {id:'sweep',  icon:'🧹', ru:'Помочь убраться',   he:'לעזור בנקיון',   descRu:'Подмести или помочь',    descHe:'לטאטא או לעזור',       pts:10 },
    {id:'plants', icon:'🌿', ru:'Полить растения',   he:'להשקות צמחים',   descRu:'1 раз в день',           descHe:'פעם ביום',             pts:5  },
    {id:'laundry',icon:'👕', ru:'Сложить вещи',      he:'לקפל בגדים',     descRu:'Разложить чистое',       descHe:'לסדר הנקי',            pts:8  },
  ],
  study: [
    {id:'hw',   icon:'📚', ru:'Домашнее задание',  he:'שיעורי בית',   descRu:'Всё, без напоминаний', descHe:'הכל, בלי תזכורות',  pts:20 },
    {id:'wb',   icon:'📓', ru:'Рабочая тетрадь',   he:'חוברת עבודה',  descRu:'1 страница',           descHe:'עמוד אחד',           pts:10 },
    {id:'read', icon:'📖', ru:'Чтение',            he:'קריאה',        descRu:'20 минут',             descHe:'20 דקות',            pts:10 },
    {id:'eng',  icon:'🇬🇧', ru:'Английский',       he:'אנגלית',       descRu:'Урок или упражнение',   descHe:'שיעור או תרגיל',    pts:15 },
    {id:'math', icon:'🔢', ru:'Математика',        he:'מתמטיקה',      descRu:'Доп. примеры',          descHe:'תרגילים נוספים',    pts:12 },
  ],
  behavior: [
    {id:'notv',  icon:'📺', ru:'Без телевизора',    he:'בלי טלוויזיה',   descRu:'Весь день',              descHe:'כל היום',             pts:20 },
    {id:'normd', icon:'⏰', ru:'Без напоминаний',   he:'בלי תזכורות',    descRu:'Сделал(а) сам(а)',       descHe:'עשה/ה לבד',           pts:15 },
    {id:'kind',  icon:'💕', ru:'Был(а) добрым(ой)', he:'היה/ה נחמד/ה',   descRu:'Помог(ла) / поддержал(а)',descHe:'עזר/ה או תמך/ה',    pts:10 },
    {id:'sleep', icon:'😴', ru:'Лёг(ла) вовремя',  he:'הלך/ה לישון בזמן',descRu:'Без споров',             descHe:'בלי ויכוחים',         pts:10 },
    {id:'eat',   icon:'🥗', ru:'Хорошо поел(а)',   he:'אכל/ה טוב',      descRu:'Попробовал(а) новое',    descHe:'ניסה/ה משהו חדש',    pts:5  },
  ]
};

// ═══ STATE ═══
let isAdmin = false;
let currentChild = 'eytan';
let state = {eytan:{points:0,history:[]}, michal:{points:0,history:[]}};
function saveLocal(){ localStorage.setItem('trackerState2', JSON.stringify(state)); }
function loadLocal(){ try{ return JSON.parse(localStorage.getItem('trackerState2'))||state; }catch(e){ return state; } }

// ═══ APPLY LANGUAGE ═══
function applyLang() {
  document.body.classList.toggle('rtl', lang==='he');
  const lbl = lang==='ru'? 'עב':'RU';
  ['lang-lbl-lock','lang-lbl-home'].forEach(id=>{ const e=document.getElementById(id); if(e) e.textContent=lbl; });

  // Lock
  _t('lt', 'lockTitle'); _t('ls','lockSub'); _t('pin-err','pinErr'); _t('view-btn','viewOnly');
  // Home
  _t('home-title','homeTitle'); _t('home-sub','homeSub'); _t('sync-txt','syncing');
  ['eytan','michal'].forEach(k=>{
    _t(k+'-card-name', null, cname(k));
    _t(k+'-card-prize', null, CHILDREN[k].prizeEmoji+' '+t('goalFor')+cpname(k));
    _t(k+'-pts-lbl','ofPts');
  });
  // Back
  _t('back-btn','back');
  // Tabs
  _t('tab-tasks-btn','tabTasks'); _t('tab-bonus-btn','tabBonus'); _t('tab-hist-btn','tabHist');
  // Sections
  _t('sec-home','secHome'); _t('sec-study','secStudy'); _t('sec-behavior','secBehavior');
  // Bonus
  _t('bonus-title','bonusTitle'); _t('bonus-desc','bonusDesc');
  const bi = document.getElementById('bonus-name'); if(bi) bi.placeholder = t('bonusPh');
  _t('bonus-go-btn','bonusBtn');
  _t('ideas-title','ideasTitle'); _t('ideas-list','ideas');
  // Win
  _t('win-sub','winSub'); _t('win-back-btn','winBack');
  // Admin
  _t('admin-title','adminTitle');
  _t('adm-lbl-eytan', null, '🧒 '+cname('eytan'));
  _t('adm-lbl-michal', null, '👧 '+cname('michal'));
  _t('reset-eytan-btn', null, '🔄 '+t('resetConfirm')+cname('eytan'));
  _t('reset-michal-btn',null, '🔄 '+t('resetConfirm')+cname('michal'));
  _t('modal-close-btn','adminClose');
  // Offline banners
  ['offline-banner','offline-banner2'].forEach(id=>{ const e=document.getElementById(id); if(e) e.textContent=t('offlineBanner'); });

  renderTasks();
}

function _t(id, key, val){
  const el = document.getElementById(id);
  if(!el) return;
  el.textContent = val !== undefined ? val : t(key);
}

function toggleLang(){
  lang = lang==='ru'?'he':'ru';
  localStorage.setItem('lang',lang);
  applyLang();
  updateHome();
  if(document.getElementById('child-screen').classList.contains('active')) updateChildHeader();
}

// ═══ PIN ═══
let pin='';
function np(d){ if(pin.length>=4)return; pin+=d; updateDots(); if(pin.length===4) setTimeout(checkPin,150); }
function nd(){ pin=pin.slice(0,-1); updateDots(); document.getElementById('pin-err').classList.remove('show'); }
function updateDots(){ for(let i=0;i<4;i++){ const d=document.getElementById('d'+i); d.classList.toggle('filled',i<pin.length); d.classList.remove('err'); } }
function checkPin(){
  if(pin===PIN){ isAdmin=true; document.getElementById('admin-btn').style.display='flex'; showScreen('home'); loadData(); }
  else{ for(let i=0;i<4;i++) document.getElementById('d'+i).classList.add('err'); document.getElementById('pin-err').classList.add('show'); setTimeout(()=>{ pin=''; updateDots(); },700); }
}
function viewOnly(){ isAdmin=false; document.getElementById('admin-btn').style.display='none'; showScreen('home'); loadData(); }

// ═══ DATA SYNC ═══
function showLoading(v){ document.getElementById('loading').classList.toggle('hidden',!v); }
function setSyncStatus(s){
  const dot=document.getElementById('sync-dot'); const txt=document.getElementById('sync-txt'); if(!dot||!txt) return;
  if(s==='ok'){ dot.classList.remove('off'); txt.textContent=t('syncOk'); }
  else if(s==='off'){ dot.classList.add('off'); txt.textContent=t('noNet'); }
  else{ dot.classList.remove('off'); txt.textContent=t('syncing'); }
}
function showBanners(show){
  ['offline-banner','offline-banner2'].forEach(id=>{ const e=document.getElementById(id); if(e) e.classList.toggle('show',show); });
}

async function loadData(){
  if(SCRIPT_URL==='PASTE_YOUR_SCRIPT_URL_HERE'){ state=loadLocal(); updateHome(); return; }
  setSyncStatus('loading'); showLoading(true);
  try{
    const res = await fetch(SCRIPT_URL+'?t='+Date.now());
    const data = await res.json();
    ['eytan','michal'].forEach(k=>{ if(data[k]){ state[k].points=data[k].points||0; state[k].history=data[k].history||[]; } });
    saveLocal(); setSyncStatus('ok'); showBanners(false);
  }catch(e){ state=loadLocal(); setSyncStatus('off'); showBanners(true); }
  finally{ showLoading(false); updateHome(); }
}

async function postData(payload){
  if(SCRIPT_URL==='PASTE_YOUR_SCRIPT_URL_HERE') return null;
  const res = await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(payload)});
  return res.json();
}

// ═══ HOME ═══
function updateHome(){
  ['eytan','michal'].forEach(k=>{
    const pts=state[k].points;
    document.getElementById(k+'-pts').textContent=pts;
    document.getElementById(k+'-mini').style.width=Math.min(100,(pts/GOAL)*100)+'%';
    document.getElementById(k+'-card-name').textContent=cname(k);
    document.getElementById(k+'-card-prize').textContent=CHILDREN[k].prizeEmoji+' '+t('goalFor')+cpname(k);
    document.getElementById(k+'-pts-lbl').textContent=t('ofPts');
  });
}

function openChild(child){
  currentChild=child;
  const c=CHILDREN[child];
  document.getElementById('child-header').className='child-header '+c.color;
  document.getElementById('h-emoji').textContent=c.emoji;
  updateChildHeader();
  renderTasks();
  switchTab('tasks');
  document.getElementById('tab-bonus-btn').style.display=isAdmin?'':'none';
  showScreen('child-screen');
}

function updateChildHeader(){
  const c=CHILDREN[currentChild]; const pts=state[currentChild].points;
  document.getElementById('h-name').textContent=cname(currentChild);
  document.getElementById('h-prize').textContent=t('goalFor')+c.prizeEmoji+' '+cpname(currentChild);
  document.getElementById('prog-fill').style.width=Math.min(100,(pts/GOAL)*100)+'%';
  document.getElementById('prog-cur').textContent=pts+t('pts');
}

// ═══ TABS ═══
let curTab='tasks';
function switchTab(tab){
  curTab=tab;
  ['tasks','bonus','hist'].forEach(t2=>{
    document.getElementById('tab-'+t2).style.display=t2===tab?'block':'none';
    const btn=document.getElementById('tab-'+t2+'-btn');
    btn.classList.remove('active','eytan-tab','michal-tab');
    if(t2===tab) btn.classList.add('active',CHILDREN[currentChild].tabCls);
  });
  if(tab==='hist') renderHistory();
}

// ═══ TASKS ═══
function renderTasks(){
  const c=CHILDREN[currentChild];
  ['home','study','behavior'].forEach(cat=>{
    const el=document.getElementById('tasks-'+cat); if(!el) return;
    el.innerHTML='';
    TASKS[cat].forEach(task=>{
      const name=lang==='he'?task.he:task.ru;
      const desc=lang==='he'?task.descHe:task.descRu;
      const div=document.createElement('div'); div.className='task-card';
      div.innerHTML=`
        <div class="task-icon">${task.icon}</div>
        <div class="task-info"><div class="task-name">${name}</div><div class="task-desc">${desc}</div></div>
        <div class="task-pts ${c.color}-c">+${task.pts}</div>
        ${isAdmin?`<button class="add-task-btn ${c.color}-btn" onclick="addTask('${task.id}','${name.replace(/'/g,"\\'")}','${task.icon}',${task.pts})">+</button>`:''}
      `;
      el.appendChild(div);
    });
  });
  // Section titles
  document.getElementById('sec-home').textContent=t('secHome');
  document.getElementById('sec-study').textContent=t('secStudy');
  document.getElementById('sec-behavior').textContent=t('secBehavior');
  // Bonus tab texts
  document.getElementById('bonus-title').textContent=t('bonusTitle');
  document.getElementById('bonus-desc').textContent=t('bonusDesc');
  document.getElementById('bonus-name').placeholder=t('bonusPh');
  document.getElementById('bonus-go-btn').textContent=t('bonusBtn');
  document.getElementById('bonus-go-btn').className='bonus-go '+c.color+'-btn';
  document.getElementById('ideas-title').textContent=t('ideasTitle');
  document.getElementById('ideas-list').textContent=t('ideas');
}

// ═══ ADD TASK ═══
async function addTask(id,name,icon,pts){
  showLoading(true);
  const newPts=Math.min(GOAL,state[currentChild].points+pts);
  const dateStr=new Date().toLocaleDateString('ru-RU',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
  state[currentChild].points=newPts;
  state[currentChild].history.push({task:name,icon,pts,date:dateStr});
  saveLocal(); updateChildHeader(); updateHome();
  showToast('+'+pts+t('addedPts')+icon);
  try{ await postData({action:'addPoints',child:currentChild,points:pts,task:name,icon}); }catch(e){ showBanners(true); }
  showLoading(false);
  if(newPts>=GOAL) setTimeout(showWin,500);
}

async function addBonus(){
  const name=document.getElementById('bonus-name').value.trim();
  const pts=parseInt(document.getElementById('bonus-pts').value);
  if(!name||!pts||pts<1){ showToast(t('fillFields')); return; }
  await addTask('bonus',name,'⭐',pts);
  document.getElementById('bonus-name').value='';
  document.getElementById('bonus-pts').value='';
}

// ═══ HISTORY ═══
function renderHistory(){
  const el=document.getElementById('hist-list'); if(!el) return;
  const hist=state[currentChild].history; const c=CHILDREN[currentChild];
  if(!hist.length){ el.innerHTML=`<div class="empty"><div class="empty-ico">📭</div>${t('emptyHist')}</div>`; return; }
  el.innerHTML='';
  [...hist].reverse().forEach((item,i)=>{
    const realIdx=hist.length-1-i;
    const div=document.createElement('div'); div.className='hist-item';
    div.innerHTML=`
      <div class="hist-icon">${item.icon}</div>
      <div class="hist-info"><div class="hist-name">${item.task}</div><div class="hist-date">${item.date}</div></div>
      <div class="hist-pts ${c.color}-c">+${item.pts}</div>
      ${isAdmin?`<button class="undo-btn" onclick="undoItem(${realIdx})">↩️</button>`:''}
    `;
    el.appendChild(div);
  });
}

async function undoItem(idx){
  const item=state[currentChild].history[idx]; if(!item) return;
  showLoading(true);
  state[currentChild].points=Math.max(0,state[currentChild].points-item.pts);
  state[currentChild].history.splice(idx,1);
  saveLocal(); updateChildHeader(); updateHome(); renderHistory();
  showToast(t('undone')+item.task);
  try{ await postData({action:'undo',child:currentChild,index:idx}); }catch(e){}
  showLoading(false);
}

// ═══ ADMIN ═══
function openAdmin(){
  document.getElementById('adm-eytan').textContent=state.eytan.points;
  document.getElementById('adm-michal').textContent=state.michal.points;
  document.getElementById('adm-lbl-eytan').textContent='🧒 '+cname('eytan');
  document.getElementById('adm-lbl-michal').textContent='👧 '+cname('michal');
  document.getElementById('reset-eytan-btn').textContent='🔄 '+t('resetConfirm')+cname('eytan');
  document.getElementById('reset-michal-btn').textContent='🔄 '+t('resetConfirm')+cname('michal');
  document.getElementById('modal-close-btn').textContent=t('adminClose');
  document.getElementById('admin-modal').classList.add('open');
}
function closeAdmin(){ document.getElementById('admin-modal').classList.remove('open'); }
async function doReset(child){
  if(!confirm(t('resetConfirm')+cname(child)+'?')) return;
  showLoading(true);
  state[child].points=0; state[child].history=[];
  saveLocal(); updateHome(); closeAdmin();
  showToast(t('resetDone')+cname(child));
  try{ await postData({action:'reset',child}); }catch(e){}
  showLoading(false);
}

// ═══ WIN ═══
function showWin(){
  const c=CHILDREN[currentChild];
  document.getElementById('win-emoji').textContent=c.prizeEmoji;
  document.getElementById('win-title').textContent=(lang==='he'?'כל הכבוד! זכית ב':'Ура! Ты получил(а) ')+cpname(currentChild)+'!';
  document.getElementById('win-sub').textContent=t('winSub');
  document.getElementById('win-back-btn').textContent=t('winBack');
  spawnConfetti(); showScreen('win');
}
function spawnConfetti(){
  const wrap=document.getElementById('confetti'); wrap.innerHTML='';
  const colors=['#4A90D9','#A855F7','#F59E0B','#4ADE80','#F87171','#38BDF8'];
  for(let i=0;i<70;i++){
    const c=document.createElement('div'); c.className='cp';
    c.style.cssText=`left:${Math.random()*100}%;top:-12px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${7+Math.random()*7}px;height:${7+Math.random()*7}px;border-radius:${Math.random()>.5?'50%':'3px'};animation-duration:${2.2+Math.random()*3}s;animation-delay:${Math.random()*2.5}s;`;
    wrap.appendChild(c);
  }
}

// ═══ NAV / UTIL ═══
function goHome(){ showScreen('home'); updateHome(); if(SCRIPT_URL!=='PASTE_YOUR_SCRIPT_URL_HERE') loadData(); }
function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
let toastT;
function showToast(msg){ const t2=document.getElementById('toast'); t2.textContent=msg; t2.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t2.classList.remove('show'),2400); }

// ═══ INIT ═══
state=loadLocal();
applyLang();
updateHome();
setInterval(()=>{ if(document.getElementById('home').classList.contains('active')&&SCRIPT_URL!=='PASTE_YOUR_SCRIPT_URL_HERE') loadData(); },60000);
</script>
